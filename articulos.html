  <link rel="stylesheet" href="css/styles.css">

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

  <!-- ====================================================================
       NAVBAR
  ===================================================================== -->
  <nav class="nav" aria-label="Navegación principal">
    <a href="index.html" class="logo" aria-label="Inicio · Jorge Enríquez">
      arq<i>·</i>enriquez
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html#blog">Blog</a></li>
      <li><a href="index.html#proyectos">Proyectos</a></li>
      <li><a href="index.html#sobre">Sobre mí</a></li>
      <li><a href="index.html#cursos">Cursos</a></li>
      <li><a href="index.html#contacto">Contacto</a></li>
      <li>
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema oscuro/claro" title="Cambiar tema">
          <span class="theme-icon">◐</span>
        </button>
      </li>
    </ul>
  </nav>


  <!-- ====================================================================
       HEADER DE LA PÁGINA DE ARCHIVO
  ===================================================================== -->
  <main>
    <section class="archive-page">

      <header class="archive-header">
        <div class="container">
          <a href="index.html#blog" class="article-back">← Volver a la portada</a>
          <p class="archive-eyebrow">— ARCHIVO COMPLETO</p>
          <h1 class="archive-title">Todos los artículos</h1>
          <p class="archive-lede">
            Notas, ensayos y reflexiones. Filtra por categoría usando las pestañas.
          </p>
        </div>
      </header>


      <!-- ================================================================
           PESTAÑAS DE FILTRO POR CATEGORÍA
           - Generadas dinámicamente desde articulos.js (sección 4.2 del JS)
           - El botón "Todas" siempre va primero
           - Si la URL tiene ?cat=xxx, esa pestaña se activa al cargar
      ================================================================ -->
      <div class="archive-tabs-wrap">
        <div class="container">
          <div class="archive-tabs" id="archiveTabs" role="tablist">
            <!-- Pestañas inyectadas por script.js -->
          </div>
        </div>
      </div>


      <!-- ================================================================
           LISTADO DE ARTÍCULOS (vista lista)
           - Cada item: miniatura izquierda + título/excerpt derecha
           - Generado dinámicamente desde articulos.js
      ================================================================ -->
      <div class="archive-list-wrap">
        <div class="container">
          <div class="archive-list" id="archiveList">
            <!-- Items inyectados por script.js -->
          </div>

          <!-- Mensaje cuando no hay resultados (oculto por default) -->
          <p class="archive-empty" id="archiveEmpty" hidden>
            No hay artículos en esta categoría todavía.
          </p>
        </div>
      </div>

    </section>
  </main>


  <!-- ====================================================================
       FOOTER
  ===================================================================== -->
  <footer class="footer">
    <div class="container footer-inner">
      <p>© <span id="currentYear">2026</span> · JORGE ENRÍQUEZ</p>
      <p>HECHO CON INTENCIÓN</p>
    </div>
  </footer>


  <!-- ====================================================================
       JAVASCRIPT
       Mismo orden que en index.html: primero los datos, luego el script.
  ===================================================================== -->
  <script src="data/articulos.js" defer></script>
  <script src="js/script.js" defer></script>

</body>
</html>
